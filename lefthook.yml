pre-commit:
  parallel: true
  commands:
    client-check:
      root: "apps/client/"
      glob: "*.{ts,tsx,json}"
      run: bun run format && bun run lint:fix && git add {staged_files}
    client-typecheck:
      root: "apps/client/"
      glob: "*.{ts,tsx}"
      run: bun run typecheck
    server-check:
      root: "apps/server/"
      glob: "*.{ts,tsx,json}"
      run: bun run format && bun run lint:fix && git add {staged_files}
    server-typecheck:
      root: "apps/server/"
      glob: "*.{ts,tsx}"
      run: bun run typecheck
